<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passport Photo Maker - MultiTool-BD</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f2f8ff;
margin:0;
padding:0;
text-align:center;
}

header{
background:#0a84ff;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.tool-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input,select,button{
padding:10px;
margin:8px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
background:#0a84ff;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#006fe0;
}

canvas{
margin-top:20px;
max-width:100%;
border:2px dashed #0a84ff;
border-radius:6px;
}

.footer{
margin-top:20px;
font-size:12px;
color:#777;
}

@media(max-width:600px){

header{
font-size:18px;
}

input,select,button{
width:100%;
margin-top:10px;
}

}

</style>
</head>

<body>

<header>
📷 Passport Photo Maker
</header>

<div class="container">

<div class="tool-box">

<h3>Upload Your Photo</h3>

<input type="file" id="upload" accept="image/*">

<br>

<label>Choose Passport Format</label>

<select id="format">

<option value="us">US Passport (2x2 inch)</option>
<option value="eu">UK / EU / India (35x45 mm)</option>
<option value="china">China (33x48 mm)</option>
<option value="square">Custom Square</option>

</select>

<br>

<label>Download Format</label>

<select id="downloadFormat">

<option value="image/png">PNG</option>
<option value="image/jpeg">JPG</option>
<option value="image/webp">WebP</option>

</select>

<br>

<button onclick="processImage()">Generate Passport Photo</button>

<br>

<canvas id="canvas"></canvas>

<br>

<button onclick="downloadImage()">Download Photo</button>

</div>

<div class="footer">
MultiTool-BD Passport Photo Tool
</div>

</div>

<script>

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

let img=new Image()

document.getElementById("upload").addEventListener("change",function(e){

let reader=new FileReader()

reader.onload=function(event){

img.src=event.target.result

}

reader.readAsDataURL(e.target.files[0])

})

function getSize(){

let format=document.getElementById("format").value

if(format==="us"){
return {w:600,h:600}
}

if(format==="eu"){
return {w:413,h:531}
}

if(format==="china"){
return {w:390,h:567}
}

if(format==="square"){
return {w:600,h:600}
}

}

function processImage(){

let size=getSize()

canvas.width=size.w
canvas.height=size.h

let min=Math.min(img.width,img.height)

let sx=(img.width-min)/2
let sy=(img.height-min)/2

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(
img,
sx,sy,
min,min,
0,0,
canvas.width,
canvas.height
)

}

function downloadImage(){

let format=document.getElementById("downloadFormat").value

let link=document.createElement("a")

link.download="passport-photo"

link.href=canvas.toDataURL(format)

link.click()

}

</script>

</body>
</html>
